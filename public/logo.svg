<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!--
    mermZen logo v4
    - Enso scaled to ~90% of viewBox
    - Inside: simple top-down flowchart: diamond → line → two branches → two terminals
    - Brush taper: thin start → thick middle → thin end, gap at bottom-left
  -->

  <!-- === ENSO CIRCLE (~90% = r≈45) === -->

  <!-- Segment 1: thin start, bottom-left rising left side -->
  <path
    d="M 18,72
       C 10,58 9,42 15,29
       C 21,16 33,8 47,6"
    fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Segment 2: thickening, top arc -->
  <path
    d="M 47,6
       C 61,4 74,11 83,23
       C 92,35 93,52 87,66"
    fill="none" stroke="#1a1a1a" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Segment 3: thickest, bottom-right sweep -->
  <path
    d="M 87,66
       C 81,78 69,87 55,90"
    fill="none" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>

  <!-- Segment 4: taper out, bottom sweep left -->
  <path
    d="M 55,90
       C 43,92 30,87 22,79"
    fill="none" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Brush tip: wispy end at bottom-left -->
  <path
    d="M 22,79 C 20,77 18.5,75 17,73"
    fill="none" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>

  <!-- === INNER FLOWCHART === -->
  <!-- Layout (vertical center flow):
       Diamond (top) → dot → left branch (circle) + right branch (rect)
       Positioned center: diamond@50,28  dot@50,48  left@35,68  right@65,68
  -->

  <!-- Top diamond: decision node -->
  <polygon
    points="50,19 61,29 50,39 39,29"
    fill="none"
    stroke="#1a1a1a"
    stroke-width="1.7"
    stroke-linejoin="round"
    transform="rotate(-2, 50, 29)"
  />

  <!-- Line: diamond → fork dot -->
  <path d="M 50,39 C 50,42 50,45 50,48"
    fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"
    transform="rotate(-2, 50, 29)"/>

  <!-- Fork dot -->
  <circle cx="50" cy="48" r="2.2" fill="#1a1a1a"/>

  <!-- Left branch line: fork → left terminal -->
  <path d="M 50,48 C 46,54 40,60 35,66"
    fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right branch line: fork → right terminal -->
  <path d="M 50,48 C 54,54 60,60 65,66"
    fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left terminal: rounded pill (end state) -->
  <rect x="28" y="66" width="14" height="8" rx="4"
    fill="none" stroke="#1a1a1a" stroke-width="1.5"
    transform="rotate(1, 35, 70)"/>

  <!-- Right terminal: square (process node) -->
  <rect x="58" y="66" width="13" height="8" rx="1.5"
    fill="none" stroke="#1a1a1a" stroke-width="1.5"
    transform="rotate(-2, 65, 70)"/>

</svg>
