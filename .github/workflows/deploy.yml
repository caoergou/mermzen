name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Start local HTTP server
        run: |
          python3 -m http.server 8766 &
          for i in $(seq 1 15); do
            curl -s http://localhost:8766/ > /dev/null && echo "Server ready on :8766" && break
            sleep 1
          done

      - name: Generate preview SVGs
        run: node scripts/generate-preview-svgs.js

      - name: Build blog posts (zh + en)
        run: node scripts/build-blog.js

      - name: Generate sitemap and robots.txt
        run: |
          chmod +x scripts/generate-sitemap.sh
          # 使用站点正式域名，与 index.html / blog 中的 canonical 一致
          BASE_URL="https://eric.run.place/MermZen"
          ./scripts/generate-sitemap.sh "$BASE_URL"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
